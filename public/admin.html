<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Trajectory Viewer</title>
<style>
:root {
  --bg: #06060e;
  --glass: rgba(255,255,255,0.035);
  --glass-border: rgba(255,255,255,0.07);
  --glass-hover: rgba(255,255,255,0.06);
  --glass-hover-border: rgba(255,255,255,0.12);
  --text: #e2e8f0;
  --text-sec: #94a3b8;
  --text-muted: #64748b;
  --text-dim: #334155;
  --blue: #60a5fa;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --radius: 14px;
  --radius-sm: 8px;
  --mono: 'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Inter','Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;position:relative}

.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(100px)}
.orb-1{width:700px;height:700px;background:rgba(99,102,241,0.07);top:-15%;left:5%;animation:f1 25s ease-in-out infinite}
.orb-2{width:500px;height:500px;background:rgba(139,92,246,0.05);bottom:0;right:5%;animation:f2 30s ease-in-out infinite}
.orb-3{width:400px;height:400px;background:rgba(14,165,233,0.04);top:40%;left:45%;animation:f3 20s ease-in-out infinite}
@keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,40px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-50px)}}
@keyframes f3{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}

.glass{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.03)}

/* TOPBAR */
.topbar{position:relative;z-index:10;background:rgba(8,8,22,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:0 24px;display:flex;align-items:center;height:50px}
.topbar h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .spacer{flex:1}
.topbar .act-btn{padding:6px 14px;cursor:pointer;color:var(--text-muted);font-size:11px;border:1px solid var(--glass-border);border-radius:7px;background:transparent;font-family:inherit;transition:all .15s;margin-left:8px}
.topbar .act-btn:hover{color:var(--text-sec);border-color:var(--glass-hover-border);background:rgba(255,255,255,0.03)}
.topbar .act-btn.danger:hover{color:var(--red);border-color:rgba(248,113,113,0.2)}

/* CONTENT */
.content{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 24px}

/* UPLOAD ZONE */
.upload-zone{padding:40px;text-align:center;border:2px dashed rgba(255,255,255,0.08);border-radius:20px;cursor:pointer;transition:all .3s;background:rgba(255,255,255,0.015);margin-bottom:24px}
.upload-zone:hover,.upload-zone.over{border-color:var(--blue);background:rgba(96,165,250,0.03)}
.upload-zone .uz-icon{font-size:32px;margin-bottom:8px;opacity:0.5}
.upload-zone h2{color:var(--text-sec);font-size:14px;font-weight:600;margin-bottom:4px}
.upload-zone p{color:var(--text-muted);font-size:11px;line-height:1.6}
input[type=file]{display:none}

/* TASK LIST */
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:12px;font-weight:700}
.task-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.task-card{padding:16px 20px;transition:all .15s;cursor:pointer;display:flex;align-items:center;gap:16px}
.task-card:hover{border-color:var(--glass-hover-border);background:var(--glass-hover)}
.task-name{font-size:14px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-meta{display:flex;gap:12px;align-items:center;flex-shrink:0}
.task-badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(255,255,255,0.04);color:var(--text-sec);border:1px solid rgba(255,255,255,0.04);white-space:nowrap}
.task-badge.has-rubrics{color:var(--green);background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.15)}
.task-creds{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.task-delete{padding:4px 10px;cursor:pointer;color:var(--text-dim);font-size:11px;border:1px solid transparent;border-radius:6px;background:transparent;font-family:inherit;transition:all .15s}
.task-delete:hover{color:var(--red);border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.04)}

/* TASK DETAIL */
#task-detail{display:none}
.back-btn{padding:6px 14px;cursor:pointer;color:var(--text-muted);font-size:11px;border:1px solid var(--glass-border);border-radius:7px;background:transparent;font-family:inherit;transition:all .15s;margin-bottom:16px}
.back-btn:hover{color:var(--text-sec);border-color:var(--glass-hover-border)}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.detail-header h2{font-size:18px;font-weight:700;flex:1}
.detail-header .act-btn{padding:6px 14px;cursor:pointer;color:var(--text-muted);font-size:11px;border:1px solid var(--glass-border);border-radius:7px;background:transparent;font-family:inherit;transition:all .15s}
.detail-header .act-btn:hover{color:var(--text-sec);border-color:var(--glass-hover-border)}
.detail-header .act-btn.primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;box-shadow:0 2px 12px rgba(99,102,241,0.25)}
.detail-header .act-btn.primary:hover{box-shadow:0 4px 16px rgba(99,102,241,0.35)}

.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.info-box{padding:14px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)}
.info-box .ib-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:4px;font-weight:600}
.info-box .ib-value{font-size:13px;font-weight:600;color:var(--text);font-family:var(--mono)}
.info-box .ib-value.copyable{cursor:pointer;transition:color .15s}
.info-box .ib-value.copyable:hover{color:var(--blue)}

/* RUBRICS */
.rubric-list{display:flex;flex-direction:column;gap:8px}
.rubric-card{padding:14px 16px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);transition:all .15s}
.rubric-card:hover{border-color:rgba(255,255,255,0.08)}
.rubric-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.rubric-criterion{flex:1;font-size:13px;color:var(--text);line-height:1.5}
.rubric-actions{display:flex;gap:4px;flex-shrink:0}
.rubric-actions button{padding:4px 8px;cursor:pointer;color:var(--text-dim);font-size:11px;border:1px solid transparent;border-radius:4px;background:transparent;font-family:inherit;transition:all .15s}
.rubric-actions button:hover{color:var(--text-sec);border-color:var(--glass-border);background:rgba(255,255,255,0.02)}
.rubric-actions .copy-btn:hover{color:var(--blue)}
.rubric-actions .del-btn:hover{color:var(--red)}
.rubric-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rubric-tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid transparent}
.tag-must{background:rgba(248,113,113,0.06);color:#f08080;border-color:rgba(248,113,113,0.1)}
.tag-good{background:rgba(251,191,36,0.05);color:#d4a94a;border-color:rgba(251,191,36,0.08)}
.tag-universal{background:rgba(148,163,184,0.06);color:#8a9bb0;border-color:rgba(148,163,184,0.1)}
.tag-positive{background:rgba(74,222,128,0.05);color:#5db87a;border-color:rgba(74,222,128,0.08)}
.tag-negative{background:rgba(248,113,113,0.05);color:#d08080;border-color:rgba(248,113,113,0.08)}
.tag-milestone{background:rgba(129,140,248,0.06);color:#9099e0;border-color:rgba(129,140,248,0.12)}
.tag-type{background:rgba(148,163,184,0.05);color:#8a9bb0;border-color:rgba(148,163,184,0.08)}
.ms-coverage{margin-bottom:16px;padding:12px 16px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)}
.ms-coverage-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;font-weight:700}
.ms-coverage-grid{display:flex;gap:6px;flex-wrap:wrap}
.ms-cov-pill{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid}
.ms-cov-ok{color:var(--green);border-color:rgba(74,222,128,0.2);background:rgba(74,222,128,0.06)}
.ms-cov-missing{color:var(--red);border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.06)}
.rubric-rationale{font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.4}

/* Generation loading */
.gen-loading{padding:40px;text-align:center}
.gen-loading .spinner{width:28px;height:28px;border-width:3px;margin:0 auto 14px}
.gen-substep{transition:opacity .2s ease;font-size:12px;color:var(--text-dim);margin-top:6px}
.gen-step{font-size:12px;color:var(--text-sec);margin-top:8px;font-weight:600}
.gen-substep{font-size:11px;color:var(--text-muted);margin-top:4px}
.gen-bar{width:200px;height:4px;background:rgba(255,255,255,0.06);border-radius:4px;margin:12px auto 0;overflow:hidden}
.gen-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),#818cf8);border-radius:4px;transition:width .6s ease}
.gen-usage{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);font-size:11px;color:var(--text-muted)}
.gen-usage strong{color:var(--text-sec)}
.gen-usage-grid{display:flex;gap:16px;margin-top:6px;flex-wrap:wrap}
.gen-usage-item{display:flex;flex-direction:column;gap:2px}
.gen-usage-label{font-size:9px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim)}
.gen-usage-val{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text-sec)}

/* RUBRIC FORM */
.rubric-form{padding:16px;margin-top:12px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06)}
.rubric-form textarea{width:100%;padding:10px;border-radius:6px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.02);color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:60px;margin-bottom:8px}
.rubric-form textarea:focus{border-color:var(--blue)}
.rubric-form .rf-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.rubric-form select,.rubric-form input[type=text]{padding:6px 10px;border-radius:6px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.02);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.rubric-form select:focus,.rubric-form input[type=text]:focus{border-color:var(--blue)}
.rubric-form .rf-actions{display:flex;gap:8px;margin-top:8px}
.rubric-form .rf-btn{padding:6px 16px;cursor:pointer;font-size:12px;font-weight:600;border-radius:6px;border:1px solid var(--glass-border);background:transparent;color:var(--text-sec);font-family:inherit;transition:all .15s}
.rubric-form .rf-btn:hover{border-color:var(--glass-hover-border);background:rgba(255,255,255,0.03)}
.rubric-form .rf-btn.save{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none}

/* EDIT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{width:500px;max-width:90vw;max-height:80vh;overflow-y:auto;padding:24px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:12px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--glass-border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.3);color:var(--green);font-size:12px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<div class="topbar">
  <h1>Trajectory Viewer Admin</h1>
  <div class="spacer"></div>
  <button class="act-btn" onclick="exportCSV()">Export Credentials CSV</button>
  <button class="act-btn danger" onclick="logout()">Logout</button>
</div>

<div class="content">
  <!-- TASK LIST VIEW -->
  <div id="task-list-view">
    <div class="upload-zone" id="upload-zone">
      <div class="uz-icon">&#128193;</div>
      <h2>Upload a task folder</h2>
      <p>Drop a folder containing model directories<br>Supports flat format (task.json + model dirs) and nested variant format (claude_md_used.txt)</p>
    </div>
    <input type="file" id="fi-folder" webkitdirectory multiple>

    <div class="section-title">Tasks</div>
    <div class="task-list" id="task-list">
      <div class="loading">Loading tasks...</div>
    </div>
  </div>

  <!-- TASK DETAIL VIEW -->
  <div id="task-detail">
    <button class="back-btn" onclick="showList()">&larr; Back to tasks</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- EDIT RUBRIC MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal glass" id="edit-modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var BASE_PATH = (window.location.pathname.match(/^\/sandbox\/[^\/]+/) || [''])[0];
var currentTaskId = null;

// ── Auth check ──
(async function() {
  var res = await fetch(BASE_PATH + '/api/auth/me');
  if (!res.ok) return window.location.href = BASE_PATH + '/login.html';
  var data = await res.json();
  if (!data.isAdmin) return window.location.href = BASE_PATH + '/viewer.html';
  loadTasks();
})();

// ── Toast ──
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Logout ──
async function logout() {
  await fetch(BASE_PATH + '/api/auth/logout', { method: 'POST' });
  window.location.href = BASE_PATH + '/login.html';
}

// ── Export CSV ──
function exportCSV() {
  window.location.href = BASE_PATH + '/api/admin/credentials/export';
}

// ═══════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════
var uz = document.getElementById('upload-zone');
var fiFolder = document.getElementById('fi-folder');

uz.addEventListener('click', function() { fiFolder.click(); });
uz.addEventListener('dragover', function(e) { e.preventDefault(); uz.classList.add('over'); });
uz.addEventListener('dragleave', function() { uz.classList.remove('over'); });
uz.addEventListener('drop', function(e) {
  e.preventDefault(); uz.classList.remove('over');
  var items = e.dataTransfer.items;
  if (items && items.length && items[0].webkitGetAsEntry) {
    var entries = [];
    for (var i = 0; i < items.length; i++) { var en = items[i].webkitGetAsEntry(); if (en) entries.push(en); }
    readEntries(entries);
  } else {
    handleFileList(e.dataTransfer.files);
  }
});
fiFolder.addEventListener('change', function(e) { handleFileList(e.target.files); });

function readEntries(entries) {
  var allFiles = [], pending = 0;
  function checkDone() { if (pending === 0) processUpload(allFiles); }
  function traverse(entry, path) {
    pending++;
    if (entry.isFile) {
      entry.file(function(f) { f._path = path + f.name; allFiles.push(f); pending--; checkDone(); });
    } else if (entry.isDirectory) {
      var reader = entry.createReader();
      (function readBatch() {
        reader.readEntries(function(results) {
          if (!results.length) { pending--; checkDone(); return; }
          for (var i = 0; i < results.length; i++) traverse(results[i], path + entry.name + '/');
          readBatch();
        });
      })();
    }
  }
  entries.forEach(function(e) { traverse(e, ''); });
}

function handleFileList(fileList) {
  var files = Array.from(fileList);
  files.forEach(function(f) { f._path = f.webkitRelativePath || f.name; });
  processUpload(files);
}

function readJSON(file) { return new Promise(function(res) { var r = new FileReader(); r.onload = function(e) { try { res(JSON.parse(e.target.result)); } catch(err) { res(null); } }; r.readAsText(file); }); }
function readText(file) { return new Promise(function(res) { var r = new FileReader(); r.onload = function(e) { res(e.target.result); }; r.readAsText(file); }); }

/* ── Parse claude_md_used.txt into taskJson format ── */
function parseClaudeMd(text) {
  var result = { task_title: null, problem_statement: null, language: null, difficulty: null, user_intent: { milestones: [], guardrails: {} } };

  // Split into ## sections
  var sections = {};
  var sectionPattern = /^##\s+(.+)$/gm;
  var match, lastKey = null, lastIdx = 0;
  var headings = [];
  while ((match = sectionPattern.exec(text)) !== null) {
    headings.push({ key: match[1].trim(), idx: match.index, end: match.index + match[0].length });
  }
  for (var i = 0; i < headings.length; i++) {
    var start = headings[i].end;
    var end = i + 1 < headings.length ? headings[i + 1].idx : text.length;
    sections[headings[i].key.toLowerCase()] = text.slice(start, end).trim();
  }

  // Problem statement from "The Task" section
  var taskSec = sections['the task'];
  if (taskSec) result.problem_statement = taskSec.trim();

  // Fallback: use "High Level Goals" from persona
  if (!result.problem_statement) {
    var personaSec = sections['your persona'];
    if (personaSec) {
      var goalsMatch = personaSec.match(/\*\*High Level Goals\*\*:\s*(.+)/i);
      if (goalsMatch) result.problem_statement = goalsMatch[1].trim();
    }
  }

  // Parse milestones
  var msSec = null;
  for (var sk in sections) {
    if (sk.indexOf('milestone') !== -1) { msSec = sections[sk]; break; }
  }
  if (msSec) {
    var msBlocks = msSec.split(/^###\s+Milestone\s+/gm).filter(Boolean);
    msBlocks.forEach(function(block) {
      var idMatch = block.match(/^(\S+)/);
      if (!idMatch) return;
      var ms = { milestone_id: idMatch[1], prompt: '', continuation_criteria: '', planned_interactions_list: [] };

      // Prompt
      var promptMatch = block.match(/\*\*Your message for this milestone\*\*:\s*([\s\S]*?)(?=\n\*\*|$)/i);
      if (promptMatch) ms.prompt = promptMatch[1].trim();

      // Continuation criteria
      var critMatch = block.match(/\*\*Do NOT advance until ALL of these are true\*\*:[^\n]*\n([\s\S]*?)(?=\n\*\*Planned|$)/i);
      if (critMatch) ms.continuation_criteria = critMatch[1].trim();

      // Planned interactions
      var triggerPattern = /- TRIGGER:\s*"([^"]+)"\s*\n\s*YOUR RESPONSE \(word for word\):\s*"([^"]+)"/gi;
      var tm;
      while ((tm = triggerPattern.exec(block)) !== null) {
        ms.planned_interactions_list.push({ trigger: tm[1], reaction: tm[2] });
      }

      result.user_intent.milestones.push(ms);
    });
  }

  // Guardrails
  var guardSec = sections['guardrails'];
  if (guardSec) {
    var maxMatch = guardSec.match(/\*\*Maximum turns\*\*:\s*(\d+)/i);
    if (maxMatch) result.user_intent.guardrails.max_turns = parseInt(maxMatch[1]);
  }

  return result;
}

async function processUpload(files) {
  uz.querySelector('h2').textContent = 'Processing...';

  // Detect format: claude_md_used.txt present means nested variant format
  var hasClaudeMd = files.some(function(f) { return (f._path || f.name).split('/').pop() === 'claude_md_used.txt'; });

  // Find root depth
  var rootDepth = Infinity;
  files.forEach(function(f) {
    var parts = (f._path || f.name).split('/');
    if (parts.length > 1 && parts.length - 1 < rootDepth) rootDepth = parts.length - 1;
  });
  if (rootDepth === Infinity) rootDepth = 0;

  if (hasClaudeMd) {
    await processNestedUpload(files, rootDepth);
    return;
  }

  // ── Flat format (original logic) ──
  var groups = {}, ungrouped = [], taskJson = null, taskName = '';

  files.forEach(function(f) {
    var path = f._path || f.name, parts = path.split('/');
    var modelDir = parts.length > rootDepth + 1 ? parts[rootDepth] : null;
    var fname = parts[parts.length - 1];
    if (!modelDir || (parts.length === rootDepth + 2 && fname === 'task.json')) { ungrouped.push(f); return; }
    if (!groups[modelDir]) groups[modelDir] = [];
    groups[modelDir].push(f);
  });
  if (!Object.keys(groups).length && ungrouped.length) { groups['model_1'] = ungrouped; }
  var modelKeys = Object.keys(groups);
  if (!modelKeys.length) { uz.querySelector('h2').textContent = 'No valid files found'; return; }

  for (var mk of modelKeys) {
    for (var f of groups[mk]) {
      var fname = f.name || (f._path || '').split('/').pop();
      if (fname === 'task.json' && !taskJson) { taskJson = await readJSON(f); break; }
    }
    if (taskJson) break;
  }
  if (!taskJson) {
    for (var uf of ungrouped) {
      if ((uf.name || '').toLowerCase() === 'task.json') { taskJson = await readJSON(uf); break; }
    }
  }

  taskName = (taskJson && (taskJson.task_title || taskJson.name)) || 'Task ' + new Date().toISOString().slice(0,10);

  var models = [];
  for (var key of modelKeys) {
    var g = groups[key];
    var model = { name: key, trajectoryJson: null, opencodeJson: null, milestoneProgress: null };
    for (var file of g) {
      var fn = file.name || (file._path || '').split('/').pop();
      var subpath = (file._path || '').toLowerCase();
      if (fn === 'opencode_export.json') model.opencodeJson = await readJSON(file);
      else if (subpath.indexOf('trajectory') !== -1 && fn.endsWith('.json')) model.trajectoryJson = await readJSON(file);
      else if (fn === 'milestone_progress.jsonl') model.milestoneProgress = await readText(file);
    }
    models.push(model);
  }

  uz.querySelector('h2').textContent = 'Uploading to server...';
  try {
    var res = await fetch(BASE_PATH + '/api/admin/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: taskName, taskJson: taskJson, models: models })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);
    toast('Task created! User: ' + data.credentials.username);
    uz.querySelector('h2').textContent = 'Upload a task folder';
    loadTasks();
  } catch(err) {
    uz.querySelector('h2').textContent = 'Upload failed: ' + err.message;
  }
}

/* ── Nested format: variant dirs containing model dirs ── */
async function processNestedUpload(files, rootDepth) {
  // Find actual structure by locating claude_md_used.txt and working backwards
  // Path: root/variant/model/claude_md_used.txt  (4 parts if root is 1 level)
  var samplePath = null;
  for (var sf of files) {
    if ((sf._path || sf.name).split('/').pop() === 'claude_md_used.txt') { samplePath = sf._path || sf.name; break; }
  }
  // samplePath = "slrparser/1e68lqqb/claude-opus-4-6/claude_md_used.txt"
  // model is at index -2, variant at -3, root at everything before variant
  var sampleParts = samplePath.split('/');
  var modelIdx = sampleParts.length - 2;  // index of model dir
  var variantIdx = modelIdx - 1;           // index of variant dir
  var rootName = sampleParts.slice(0, variantIdx).join('/') || sampleParts[0] || 'Task';

  // Look for a task.json at root level (outside variants)
  var rootTaskJson = null;
  for (var rtf of files) {
    var rtParts = (rtf._path || rtf.name).split('/');
    var rtFname = rtParts[rtParts.length - 1];
    // task.json should be above the variant level
    if (rtFname === 'task.json' && rtParts.length <= variantIdx + 1) {
      rootTaskJson = await readJSON(rtf);
      break;
    }
  }

  // Group: variantId -> modelName -> [files]
  var variantGroups = {};
  files.forEach(function(f) {
    var parts = (f._path || f.name).split('/');
    if (parts.length < variantIdx + 3) return;
    var variantId = parts[variantIdx];
    var modelName = parts[variantIdx + 1];
    if (!variantGroups[variantId]) variantGroups[variantId] = {};
    if (!variantGroups[variantId][modelName]) variantGroups[variantId][modelName] = [];
    variantGroups[variantId][modelName].push(f);
  });

  var variantIds = Object.keys(variantGroups);
  if (!variantIds.length) { uz.querySelector('h2').textContent = 'No valid files found'; return; }

  var created = 0, total = variantIds.length;
  for (var vi = 0; vi < variantIds.length; vi++) {
    var variantId = variantIds[vi];
    var modelMap = variantGroups[variantId];
    var modelNames = Object.keys(modelMap);
    uz.querySelector('h2').textContent = 'Uploading variant ' + (vi + 1) + ' of ' + total + '...';

    // Use root task.json if available, otherwise parse claude_md_used.txt
    var taskJson = rootTaskJson ? JSON.parse(JSON.stringify(rootTaskJson)) : null;
    if (!taskJson) {
      for (var mn of modelNames) {
        if (taskJson) break;
        for (var f of modelMap[mn]) {
          if ((f._path || f.name).split('/').pop() === 'claude_md_used.txt') {
            var mdText = await readText(f);
            taskJson = parseClaudeMd(mdText);
            break;
          }
        }
      }
    }
    if (!taskJson) taskJson = { problem_statement: null, user_intent: { milestones: [], guardrails: {} } };
    var displayName = (taskJson.task_title || rootName) + ' / ' + variantId;
    taskJson.task_title = displayName;

    // Build models array
    var models = [];
    for (var mName of modelNames) {
      var mFiles = modelMap[mName];
      var model = { name: mName, trajectoryJson: null, opencodeJson: null, milestoneProgress: null };
      for (var file of mFiles) {
        var fn = (file._path || file.name).split('/').pop();
        if (fn === 'opencode_export.json') model.opencodeJson = await readJSON(file);
        else if (fn === 'trajectory.json') model.trajectoryJson = await readJSON(file);
        else if (fn === 'milestone_progress.jsonl') model.milestoneProgress = await readText(file);
      }
      models.push(model);
    }

    try {
      var res = await fetch(BASE_PATH + '/api/admin/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: taskJson.task_title, taskJson: taskJson, models: models })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error);
      created++;
    } catch(err) {
      console.error('Failed to upload variant ' + variantId + ':', err);
    }
  }

  toast(created + ' task' + (created !== 1 ? 's' : '') + ' created from ' + total + ' variant' + (total !== 1 ? 's' : ''));
  uz.querySelector('h2').textContent = 'Upload a task folder';
  loadTasks();
}

// ═══════════════════════════════════════════════
// RUBRIC ACTIONS
// ═══════════════════════════════════════════════
var _genPollTimer = null;
var _genFlavorTimer = null;
var _genCurrentStep = 1;
var _genLastFlavor = '';

var GEN_FLAVORS = {
  1: [
    'Analyzing trajectories...', 'Studying agent behavior...', 'Examining milestones...',
    'Crafting evaluation criteria...', 'Inspecting code changes...', 'Mapping success patterns...',
    'Identifying key signals...', 'Distilling requirements...', 'Pondering what matters...',
    'Reading between the lines...', 'Connecting the dots...', 'Weighing trade-offs...'
  ],
  2: [
    'Getting a second opinion...', 'Cross-examining criteria...', 'Stress-testing rubrics...',
    'Playing devil\'s advocate...', 'Checking for blind spots...', 'Hunting for redundancies...',
    'Probing for vagueness...', 'Challenging assumptions...', 'Scrutinizing coverage...',
    'Poking holes in the logic...', 'Seeking fresh perspectives...', 'Sharpening the edges...'
  ],
  3: [
    'Deliberating on feedback...', 'Synthesizing insights...', 'Polishing final criteria...',
    'Making the tough calls...', 'Balancing the rubric mix...', 'Fine-tuning wording...',
    'Almost there...', 'Putting finishing touches...', 'Wrapping things up...',
    'Locking in the final set...', 'One last look...', 'Dotting the i\'s...'
  ]
};

function pickFlavor(step) {
  var pool = GEN_FLAVORS[step] || GEN_FLAVORS[1];
  var pick;
  do { pick = pool[Math.floor(Math.random() * pool.length)]; } while (pick === _genLastFlavor && pool.length > 1);
  _genLastFlavor = pick;
  return pick;
}

function updateGenProgress(p) {
  var stepEl = document.querySelector('.gen-step');
  var barEl = document.querySelector('.gen-bar-fill');
  if (stepEl) stepEl.textContent = 'Step ' + p.step + ' of 3';
  if (barEl) barEl.style.width = Math.round((p.step / 3) * 100) + '%';
  if (p.step !== _genCurrentStep) {
    _genCurrentStep = p.step;
    rotateFlavor();
  }
}

function rotateFlavor() {
  var subEl = document.querySelector('.gen-substep');
  if (subEl) {
    subEl.style.opacity = '0';
    setTimeout(function() {
      subEl.textContent = pickFlavor(_genCurrentStep);
      subEl.style.opacity = '1';
    }, 200);
  }
}

function startProgressPoll() {
  _genCurrentStep = 1;
  _genPollTimer = setInterval(async function() {
    try {
      var res = await fetch(BASE_PATH + '/api/admin/tasks/' + currentTaskId + '/generate-rubrics/progress');
      var p = await res.json();
      if (p.active) updateGenProgress(p);
    } catch(e) {}
  }, 2000);
  _genFlavorTimer = setInterval(rotateFlavor, 7500);
}

function stopProgressPoll() {
  if (_genPollTimer) { clearInterval(_genPollTimer); _genPollTimer = null; }
  if (_genFlavorTimer) { clearInterval(_genFlavorTimer); _genFlavorTimer = null; }
}

async function generateRubrics() {
  if (!confirm('This will replace all existing rubrics with a freshly generated set. Continue?')) return;

  var listEl = document.getElementById('rubric-list');
  if (listEl) {
    listEl.innerHTML = '<div class="gen-loading">' +
      '<div class="spinner" style="display:inline-block"></div>' +
      '<div class="gen-step">Step 1 of 3</div>' +
      '<div class="gen-substep">' + pickFlavor(1) + '</div>' +
      '<div class="gen-bar"><div class="gen-bar-fill" style="width:10%"></div></div>' +
      '<div style="margin-top:6px;font-size:10px;color:var(--text-dim)">This usually takes 30-60 seconds</div>' +
      '</div>';
  }

  var btn = document.querySelector('.detail-header .act-btn.primary');
  btn.textContent = 'Generating...';
  btn.disabled = true;

  startProgressPoll();

  try {
    var res = await fetch(BASE_PATH + '/api/admin/tasks/' + currentTaskId + '/generate-rubrics', { method: 'POST' });
    stopProgressPoll();
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);

    toast('Generated ' + data.rubrics.length + ' rubrics');
    showTask(currentTaskId);

    if (data.usage) {
      setTimeout(function() {
        var list = document.getElementById('rubric-list');
        if (!list) return;
        var u = data.usage;
        var usageHtml = '<div class="gen-usage">';
        usageHtml += '<strong>Last generation usage</strong>';
        usageHtml += '<div class="gen-usage-grid">';
        usageHtml += '<div class="gen-usage-item"><span class="gen-usage-label">Input tokens</span><span class="gen-usage-val">' + u.total_input.toLocaleString() + '</span></div>';
        usageHtml += '<div class="gen-usage-item"><span class="gen-usage-label">Output tokens</span><span class="gen-usage-val">' + u.total_output.toLocaleString() + '</span></div>';
        usageHtml += '<div class="gen-usage-item"><span class="gen-usage-label">Total tokens</span><span class="gen-usage-val">' + u.total_tokens.toLocaleString() + '</span></div>';
        usageHtml += '<div class="gen-usage-item"><span class="gen-usage-label">Est. cost</span><span class="gen-usage-val">$' + u.estimated_cost.toFixed(3) + '</span></div>';
        usageHtml += '</div>';
        usageHtml += '<div style="margin-top:8px;font-size:10px;color:var(--text-dim)">';
        var stepLabels = { generate: 'Generate', critique: 'Critique', finalize: 'Finalize' };
        u.steps.forEach(function(s) {
          usageHtml += (stepLabels[s.step] || s.step) + ': ' + s.prompt_tokens.toLocaleString() + ' in / ' + s.completion_tokens.toLocaleString() + ' out<br>';
        });
        usageHtml += '</div></div>';
        list.insertAdjacentHTML('beforebegin', usageHtml);
      }, 100);
    }
  } catch(err) {
    stopProgressPoll();
    alert('Generation failed: ' + err.message);
    showTask(currentTaskId);
  }
}

}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('active');
}
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function renderRubricFormHTML(criterion, type, importance, isPositive, milestoneId, rationale, saveAction, cancelAction) {
  return '<div class="rubric-form">' +
    '<textarea placeholder="Rubric criterion (e.g. Agent creates the migration file)">' + esc(criterion) + '</textarea>' +
    '<div class="rf-row">' +
    '<select name="type"><option value="correctness"' + (type === 'correctness' ? ' selected' : '') + '>correctness</option><option value="communication"' + (type === 'communication' ? ' selected' : '') + '>communication</option><option value="agent_behavior"' + (type === 'agent_behavior' ? ' selected' : '') + '>agent_behavior</option><option value="code_style"' + (type === 'code_style' ? ' selected' : '') + '>code_style</option></select>' +
    '<select name="importance"><option value="MUST_FOLLOW"' + (importance === 'MUST_FOLLOW' ? ' selected' : '') + '>MUST_FOLLOW</option><option value="GOOD_TO_HAVE"' + (importance === 'GOOD_TO_HAVE' ? ' selected' : '') + '>GOOD_TO_HAVE</option><option value="UNIVERSAL"' + (importance === 'UNIVERSAL' ? ' selected' : '') + '>UNIVERSAL</option></select>' +
    '<select name="is_positive"><option value="true"' + (isPositive ? ' selected' : '') + '>Positive (PASS = met)</option><option value="false"' + (!isPositive ? ' selected' : '') + '>Negative (PASS = not met)</option></select>' +
    '<input type="text" name="milestone_id" placeholder="Milestone ID" value="' + esc(milestoneId) + '" style="width:120px">' +
    '</div>' +
    '<input type="text" name="rationale" placeholder="Rationale (optional)" value="' + esc(rationale) + '" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.02);color:var(--text);font-size:12px;font-family:inherit;outline:none">' +
    '<div class="rf-actions">' +
    '<button class="rf-btn save" onclick="' + saveAction + '">Save</button>' +
    '<button class="rf-btn" onclick="' + cancelAction + '">Cancel</button>' +
    '</div></div>';
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(function() { toast('Copied!'); });
}
</script>
